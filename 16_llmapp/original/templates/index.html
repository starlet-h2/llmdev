{% extends 'base.html' %}

{% block content %}
<div class="chat-box" id="chat-box">
    {% for message in messages %}
    <div class="{{ message.class }}">
        {{ message.text|safe }}
    </div>
    {% endfor %}
</div>

<div id="loading" class="loading" style="display: none;">
    <div class="spinner"></div>
    <p>思考プロセスの最適化中...</p>
</div>

<form method="POST" action="/" id="chat-form">
    <div class="input-box">
        <textarea name="user_message" id="user-input" placeholder="メッセージを入力..." required autofocus></textarea>
        <button type="submit" id="submit-button">データ送信</button>
    </div>
</form>

<form method="POST" action="/clear">
    <button type="submit" class="clear-button">データ消去</button>
</form>

<script src="{{ url_for('static', filename='main.js') }}"></script>
{% endblock %}
